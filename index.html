<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Radar de licitacions · CTTI i Generalitat</title>
<style>
:root{
 --bg:#FAFAF8; --surface:#FFFFFF; --ink:#1A1A17; --muted:#6F6E66; --faint:#9A998F;
 --line:#E8E6DD; --line2:#D6D4C9; --accent:#1B3A6B;
 --teal:#0F6E56; --teal-bg:#E1F5EE; --amber:#854F0B; --amber-bg:#FAEEDA;
 --red:#A32D2D; --red-bg:#FBEBEB; --blue:#185FA5; --purple:#534AB7;
 --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
 --sans:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
}
@media (prefers-color-scheme:dark){
 :root{ --bg:#15151A; --surface:#1E1E24; --ink:#ECEBE4; --muted:#9E9D94; --faint:#6C6B63;
        --line:#2B2B31; --line2:#3A3A41; --accent:#9FC0F0; }
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:inherit}
.wrap{max-width:940px;margin:0 auto;padding:0 16px 64px}
header.top{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--line);padding:14px 0 10px}
.tt{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap}
.tt h1{font-size:17px;font-weight:600;margin:0;letter-spacing:-.01em}
.tt h1 span{color:var(--muted);font-weight:400}
.status{font-family:var(--mono);font-size:12px;color:var(--muted);display:flex;align-items:center;gap:7px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--faint)}
.dot.on{background:#1D9E75}.dot.off{background:#BA7517}
.controls{display:flex;flex-wrap:wrap;gap:8px 10px;align-items:center;margin-top:12px}
.seg{display:inline-flex;border:1px solid var(--line2);border-radius:8px;overflow:hidden}
.seg button{appearance:none;border:0;background:transparent;color:var(--muted);font:inherit;font-size:13px;padding:6px 12px;cursor:pointer;border-right:1px solid var(--line2)}
.seg button:last-child{border-right:0}
.seg button.act{background:var(--accent);color:#fff}
@media (prefers-color-scheme:dark){.seg button.act{color:#15151A}}
.chk{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);cursor:pointer;user-select:none;padding:5px 0}
.chk input{accent-color:var(--accent);width:15px;height:15px}
.search{flex:1;min-width:160px}
.search input{width:100%;font:inherit;font-size:13px;padding:7px 11px;border:1px solid var(--line2);border-radius:8px;background:var(--surface);color:var(--ink)}
.search input:focus{outline:2px solid var(--accent);outline-offset:1px}
.count{font-family:var(--mono);font-size:12px;color:var(--muted);margin:16px 2px 10px}
.list{display:flex;flex-direction:column;gap:12px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px 18px;position:relative}
.card.rail{padding-left:18px}
.card.rail::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:12px 0 0 12px}
.rail-amber::before{background:var(--amber)} .rail-red::before{background:var(--red)}
.c-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.c-meta{min-width:0}
.exp{font-family:var(--mono);font-size:12px;color:var(--muted)}
.organ{display:block;font-size:12.5px;color:var(--faint);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:520px}
.objecte{font-size:15px;font-weight:500;margin:7px 0 2px;line-height:1.4}
.pill{flex:none;font-size:11.5px;padding:3px 9px;border-radius:7px;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.pill-open{background:var(--teal-bg);color:var(--teal)} .pill-closed{background:#F1EFE8;color:#5F5E5A}
.pill-adj{background:#E6F1FB;color:#0C447C} .pill-aval{background:#FAEEDA;color:#633806}
.badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.b{font-size:11.5px;padding:3px 9px;border-radius:7px;background:var(--bg);border:1px solid var(--line);color:var(--muted)}
.b-amber{background:var(--amber-bg);border-color:transparent;color:var(--amber)}
.b-gray{background:var(--bg);color:var(--muted)}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
@media(max-width:560px){.metrics{grid-template-columns:1fr 1fr}}
.m{background:var(--bg);border-radius:8px;padding:10px 12px}
.m .k{font-size:11.5px;color:var(--muted)}
.m .v{font-size:18px;font-weight:500;font-variant-numeric:tabular-nums;margin-top:3px}
.m .v.neg{color:var(--teal)}
.m .sub{font-size:11px;color:var(--faint);margin-top:1px}
.crit{margin-top:14px}
.crit .lab{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.bar{display:flex;height:12px;border-radius:99px;overflow:hidden;gap:2px}
.bar span{display:block}
.leg{display:flex;flex-wrap:wrap;gap:14px;margin-top:8px;font-size:12.5px}
.leg i{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:5px;vertical-align:0}
.bid{margin-top:13px;border-top:1px solid var(--line);padding-top:11px}
.bid .h{font-size:12px;color:var(--muted);margin-bottom:6px}
.bid ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:3px}
.bid li{font-size:13px;display:flex;align-items:center;gap:7px}
.bid .win{color:var(--teal);font-weight:500}
.bid .nif{font-family:var(--mono);font-size:11px;color:var(--faint);margin-left:auto}
.hint{font-size:12.5px;color:var(--muted);margin-top:11px}
.hint a{color:var(--blue);text-decoration:none}.hint a:hover{text-decoration:underline}
details.look{margin-top:12px}
details.look>summary{cursor:pointer;font-size:12.5px;color:var(--blue);list-style:none}
details.look>summary::-webkit-details-marker{display:none}
details.look>summary::before{content:"▸ ";color:var(--faint)}
details.look[open]>summary::before{content:"▾ "}
.look-body{font-size:12.5px;color:var(--muted);margin-top:8px}
.look-body table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
.look-body td{padding:3px 0;border-bottom:1px solid var(--line)}
.look-body .pct{color:var(--teal);text-align:right;white-space:nowrap}
.c-foot{margin-top:14px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.lnk{display:inline-flex;align-items:center;gap:6px;font-size:13px;text-decoration:none;color:var(--ink);border:1px solid var(--line2);border-radius:8px;padding:6px 12px}
.lnk:hover{border-color:var(--accent)}
.faint{color:var(--faint);font-size:12px}
.empty{text-align:center;color:var(--muted);padding:48px 16px;border:1px dashed var(--line2);border-radius:12px}
.empty b{display:block;color:var(--ink);font-weight:500;margin-bottom:6px}
.spin{text-align:center;color:var(--muted);padding:40px;font-size:14px}
</style>
</head>

<div class="wrap">
<header class="top">
  <div class="tt">
    <h1>Radar de licitacions <span>· CTTI i Generalitat</span></h1>
    <div class="status" id="status"><span class="dot" id="dot"></span><span id="statusTxt">carregant…</span></div>
  </div>
  <div class="controls">
    <div class="seg" id="scope">
      <button data-v="gen" class="act">Generalitat</button>
      <button data-v="ctti">Només CTTI</button>
    </div>
    <div class="seg" id="phase">

      <button data-v="adj">Adjudicades</button>

    <label class="chk"><input type="checkbox" id="cpv" checked> Filtre TIC</label>
    <label class="chk"><input type="checkbox" id="sda"> Només SDA</label>
    <div class="search"><input id="q" placeholder="Cerca objecte, òrgan o expedient…"></div>
  </div>
</header>
<div class="count" id="count"></div>
<div class="list" id="list"><div class="spin">Connectant amb dades obertes…</div></div>
</div>

function cpvMatch(arr){return (arr||[]).some(c=>GROUPS.has(String(c).slice(0,3)));}
function num(v){const n=parseFloat(v);return isNaN(n)?null:n;}
function txt(v){return (v&&typeof v==="object")?(v.ca||v.es||v.en||""):(v||"");}
function urlOf(v){return (v&&typeof v==="object")?v.url:v;}
function sdaKind(r){r=r||"";if(r.indexOf("Específic")>=0)return "child";if(r==="Sistema Dinàmic d'adquisició")return "parent";return "";}
function normalize(r){
 const cpv=(r.codi_cpv||"").split("||").map(s=>s.trim()).filter(Boolean).slice(0,4);
 return {exp:r.codi_expedient,organCode:r.codi_organ,organ:txt(r.nom_organ),dept:txt(r.nom_departament_ens),
  objecte:txt(r.objecte_contracte),cpv,proc:r.procediment||"",tram:r.tipus_tramitacio||"",sda:sdaKind(r.racionalitzacio_contractacio),
  base:num(r.pressupost_licitacio_sense),vec:num(r.valor_estimat_contracte),termini:r.termini_presentacio_ofertes||null,
  fase:r.fase_publicacio,url:urlOf(r.enllac_publicacio),adj:txt(r.denominacio_adjudicatari)||null,
  importAdj:num(r.import_adjudicacio_sense),ofertes:(num(r.ofertes_rebudes)!=null?Math.round(num(r.ofertes_rebudes)):null)};
}
function dedup(rows){const m={};for(const r of rows){if(r.exp&&!(r.exp in m))m[r.exp]=r;}return Object.values(m);}
const eurF=new Intl.NumberFormat("ca-ES",{style:"currency",currency:"EUR",maximumFractionDigits:0});
function eur(n){return n==null?"—":eurF.format(Math.round(n));}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function daysLeft(iso){if(!iso)return null;return Math.ceil((new Date(iso)-new Date())/864e5);}
function short(s){s=String(s||"").replace(/^L[’']objecte de la present licitaci[oó].{0,12}?(és|es)\s*/i,"");if(s.length>165)s=s.slice(0,162).trim()+"…";return s;}
function dmy(iso){if(!iso)return "";const d=new Date(iso);return ("0"+d.getDate()).slice(-2)+"/"+("0"+(d.getMonth()+1)).slice(-2)+"/"+d.getFullYear();}

const state={scope:"gen",phase:"lic",cpv:true,sda:false,q:"",live:null,rows:[]};

function whereScope(s){return s==="ctti"?"codi_organ='11110'":"nom_ambit like '%Generalitat de Catalunya%'";}
function whereFor(s,ph){
 const sc=whereScope(s);
 if(ph==="lic"){const since=new Date(Date.now()-30*864e5).toISOString();return sc+" AND fase_publicacio='Anunci de licitació' AND termini_presentacio_ofertes > '"+since+"'";}
 if(ph==="aval")return sc+" AND fase_publicacio='Expedient en avaluació'";
 return sc+" AND fase_publicacio='Adjudicació'";
}
function whereSpec(s){return whereScope(s)+" AND fase_publicacio='Anunci de licitació' AND racionalitzacio_contractacio like '%Específic%'";}
function orderFor(ph){return ph==="lic"?"termini_presentacio_ofertes ASC":(ph==="adj"?"data_publicacio_adjudicacio DESC":"termini_presentacio_ofertes DESC");}

async function sodaFetch(where,order,limit){
 const u=new URL(SODA);
 u.searchParams.set("$select",SELECT);u.searchParams.set("$where",where);
 if(order)u.searchParams.set("$order",order);u.searchParams.set("$limit",String(limit));
 let lastErr;
 for(let i=0;i<3;i++){
  const c=new AbortController();const to=setTimeout(()=>c.abort(),22000);
  try{
   const res=await fetch(u.toString(),{signal:c.signal,headers:{"Accept":"application/json"}});
   clearTimeout(to);
   if(!res.ok){lastErr=new Error("HTTP "+res.status);if(res.status>=400&&res.status<500)throw lastErr;await new Promise(r=>setTimeout(r,800*(i+1)));continue;}
   const data=await res.json();
   if(!Array.isArray(data)){lastErr=new Error("resposta no-array");await new Promise(r=>setTimeout(r,900));continue;}
   return data;
  }catch(e){clearTimeout(to);lastErr=e;await new Promise(r=>setTimeout(r,700*(i+1)));}
 }
 throw lastErr;
}
async function load(){
 setStatus("load");
 try{
  let rows;
  if(state.phase==="lic"){
   const [rg,rs]=await Promise.allSettled([
     sodaFetch(whereFor(state.scope,"lic"),orderFor("lic"),900),
     sodaFetch(whereSpec(state.scope),"termini_presentacio_ofertes DESC",200)
   ]);
   if(rg.status!=="fulfilled"&&rs.status!=="fulfilled")throw (rg.reason||rs.reason);
   rows=(rg.status==="fulfilled"?rg.value:[]).concat(rs.status==="fulfilled"?rs.value:[]);
  } else {
   rows=await sodaFetch(whereFor(state.scope,state.phase),orderFor(state.phase),300);
  }
  state.rows=dedup(rows.map(normalize));
  state.live=true;
 }catch(e){
  state.live=false;
  state.rows=(state.phase==="adj"?SNAPSHOT.adjudicated:(state.phase==="lic"?SNAPSHOT.open:[]));
 }
 render();
}
function visible(){
 let rows=state.rows.slice();
 if(state.scope==="ctti"&&state.live===false)rows=rows.filter(r=>(r.organ||"").indexOf("Telecomunicacions")>=0||String(r.exp||"").indexOf("CTTI")===0);
 if(state.cpv)rows=rows.filter(r=>cpvMatch(r.cpv)||r.sda==="child");
 if(state.sda)rows=rows.filter(r=>r.sda);
 if(state.q){const q=state.q.toLowerCase();rows=rows.filter(r=>((r.exp||"")+" "+(r.organ||"")+" "+(r.objecte||"")).toLowerCase().indexOf(q)>=0);}
 rows.sort((a,b)=>(a.termini||"9999").localeCompare(b.termini||"9999"));
 if(state.phase==="adj")rows.reverse();
 if(state.phase==="lic")rows.sort((a,b)=>(a.sda==="child"?0:1)-(b.sda==="child"?0:1));
 return rows;
}
function setStatus(kind){
 const dot=document.getElementById("dot"),tx=document.getElementById("statusTxt");
 if(kind==="load"){dot.className="dot";tx.textContent="carregant…";return;}
 if(state.live){dot.className="dot on";tx.textContent="en viu · "+new Date().toLocaleTimeString("ca-ES",{hour:"2-digit",minute:"2-digit"});}
 else{dot.className="dot off";tx.textContent="mostra (sense connexió en viu)";}
}
function metric(k,v,sub,neg){return '<div class="m"><div class="k">'+esc(k)+'</div><div class="v'+(neg?' neg':'')+'">'+v+'</div>'+(sub?'<div class="sub">'+esc(sub)+'</div>':'')+'</div>';}
function metricTermini(d,iso){
 if(d==null)return metric("Termini d'ofertes","—");
 if(d<=0)return metric("Termini d'ofertes","tancat","el "+dmy(iso));
 return metric("Termini d'ofertes",d+" dies",dmy(iso));
}
function critBlock(e){
 if(!e.criteris)return "";
 const tot=e.criteris.reduce((a,c)=>a+c.p,0);
 const bar=e.criteris.map(c=>'<span style="width:'+(c.p/tot*100)+'%;background:'+c.c+'"></span>').join("");
 const leg=e.criteris.map(c=>'<span><i style="background:'+c.c+'"></i>'+esc(c.l)+' <b style="font-weight:500">'+c.p+'</b></span>').join("");
 return '<div class="crit"><div class="lab"><span>Criteris d\'adjudicació</span><span>'+tot+' punts</span></div><div class="bar">'+bar+'</div><div class="leg">'+leg+'</div></div>';
}
function bidBlock(r,e,isAdj){
 if(e.licitadors){
  const li=e.licitadors.map(b=>'<li class="'+(b.g?'win':'')+'">'+(b.g?'✓ ':'')+esc(b.nom)+'<span class="nif">'+esc(b.nif||"")+'</span></li>').join("");
  return '<div class="bid"><div class="h">Es van presentar ('+e.licitadors.length+')</div><ul>'+li+'</ul></div>';
 }
 if(isAdj){
  let h='';
  if(r.adj)h+='<div class="bid"><div class="h">Adjudicatari</div><ul><li class="win">✓ '+esc(r.adj)+'</li></ul>';
  else h+='<div class="bid">';
  h+='<div class="hint">'+(r.ofertes!=null?('Ofertes rebudes: '+r.ofertes+'. '):'')+'Llista de licitadors: <a href="'+esc(r.url||'#')+'" target="_blank" rel="noopener">obre la publicació</a></div></div>';
  return h;
 }
 return "";
}
function lookBlock(r){
 return '<details class="look" data-organ="'+esc(r.organCode||"")+'" data-cpv="'+esc((r.cpv[0]||"").slice(0,2))+'"><summary>Incumbent / rondes anteriors (mateix òrgan + CPV)</summary><div class="look-body">…</div></details>';
}
async function loadLook(det){
 const body=det.querySelector(".look-body");
 if(det.dataset.done)return;det.dataset.done="1";
 const organ=det.dataset.organ,div=det.dataset.cpv;
 if(!state.live||!organ){body.innerHTML='Disponible només en mode en viu (obre el fitxer al navegador).';return;}
 body.innerHTML='cercant…';
 try{
  const rows=await sodaFetch("codi_organ='"+organ+"' AND fase_publicacio='Adjudicació' AND upper(codi_cpv) like '%"+div+"%'","data_publicacio_adjudicacio DESC",8);
  const seen={};const out=[];
  for(const raw of rows){const r=normalize(raw);if(seen[r.exp])continue;seen[r.exp]=1;
   if(r.base&&r.importAdj){const d=(r.base-r.importAdj)/r.base*100;out.push('<tr><td>'+esc(r.adj||"—")+'</td><td class="pct">−'+d.toFixed(1)+'%</td></tr>');}
   if(out.length>=5)break;}
  body.innerHTML=out.length?('<table>'+out.join("")+'</table>'):'Sense adjudicacions prèvies comparables.';
 }catch(e){body.innerHTML='No s\'ha pogut consultar.';}
}
function statusPill(r){
 if(state.phase==="adj")return '<span class="pill pill-adj">Adjudicada</span>';
 if(state.phase==="aval")return '<span class="pill pill-aval">En avaluació</span>';
 const d=daysLeft(r.termini);
 if(d!=null&&d<=0)return '<span class="pill pill-closed">Termini tancat</span>';
 return '<span class="pill pill-open">Oberta'+(d!=null?' · '+d+' d':'')+'</span>';
}
function card(r){
 const e=ENRICH[r.exp]||{};const isAdj=state.phase==="adj",isOpen=state.phase==="lic";
 const d=daysLeft(r.termini);
 const disc=(r.base&&r.importAdj)?((r.base-r.importAdj)/r.base*100):null;
 const rail=r.sda==="child"?"rail rail-amber":(isOpen&&d!=null&&d>0&&d<=7?"rail rail-red":"");
 let bdg='';
 if(r.sda==="child")bdg+='<span class="b b-amber">Específic SDA</span>';
 if(r.sda==="parent")bdg+='<span class="b b-gray">Marc SDA · permanent</span>';
 if(r.cpv[0])bdg+='<span class="b b-gray">CPV '+esc(r.cpv[0])+(r.cpv.length>1?' +'+(r.cpv.length-1):'')+'</span>';
 if(r.proc)bdg+='<span class="b b-gray">'+esc(r.proc)+'</span>';
 else if(r.sda==="child")bdg+='<span class="b b-gray">Derivat d\'SDA</span>';
 let m3=isAdj?metric("Descompte",disc!=null?('−'+disc.toFixed(1)+'%'):'—',r.ofertes!=null?(r.ofertes+' ofertes'):'',true):metricTermini(d,r.termini);
 let m2=isAdj?metric("Import adjudicació",eur(r.importAdj)):metric("Valor estimat (VEC)",eur(r.vec));
 return '<article class="card '+rail+'">'
  +'<div class="c-head"><div class="c-meta"><span class="exp">'+esc(r.exp||"—")+'</span><span class="organ">'+esc(r.organ||"")+'</span></div>'+statusPill(r)+'</div>'
  +'<div class="objecte">'+esc(short(r.objecte))+'</div>'
  +'<div class="badges">'+bdg+'</div>'
  +'<div class="metrics">'+metric("Pressupost base",eur(r.base))+m2+m3+'</div>'
  +critBlock(e)
  +bidBlock(r,e,isAdj)
  +(isOpen?lookBlock(r):'')
  +'<div class="c-foot">'+(r.url?'<a class="lnk" href="'+esc(r.url)+'" target="_blank" rel="noopener">↗ Publicació oficial</a>':'<span class="faint">sense enllaç</span>')
  +(!e.criteris&&(isOpen||state.phase==="aval")?'<span class="hint">Criteris: <a href="'+esc(r.url||"#")+'" target="_blank" rel="noopener">al plec de la publicació</a></span>':'')+'</div>'
  +'</article>';
}
function render(){
 setStatus();
 const rows=visible();
 const cnt=document.getElementById("count");
 const ph={lic:"en licitació",aval:"en avaluació",adj:"adjudicades"}[state.phase];
 cnt.textContent=rows.length+" licitacions "+ph+(state.cpv?" · filtre TIC actiu":"")+(state.scope==="ctti"?" · CTTI":" · Generalitat");
 const list=document.getElementById("list");
 if(!rows.length){
  let msg=state.live===false&&state.phase==="aval"
   ?"<b>Sense dades en mode mostra</b>Aquesta vista necessita connexió en viu. Obre el fitxer al navegador (doble clic) o publica\u2019l perquè es connecti a dades obertes."
   :"<b>Cap resultat</b>Prova de treure el filtre TIC, canviar de fase o ampliar a tota la Generalitat.";
  list.innerHTML='<div class="empty">'+msg+'</div>';return;
 }
 list.innerHTML=rows.map(card).join("");
 list.querySelectorAll("details.look").forEach(det=>det.addEventListener("toggle",()=>{if(det.open)loadLook(det);}));
}
function seg(id,key){document.getElementById(id).addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;
 [...e.currentTarget.children].forEach(x=>x.classList.remove("act"));b.classList.add("act");state[key]=b.dataset.v;
 if(key==="scope"||key==="phase")load();else render();});}
seg("scope","scope");seg("phase","phase");
document.getElementById("cpv").addEventListener("change",e=>{state.cpv=e.target.checked;render();});
document.getElementById("sda").addEventListener("change",e=>{state.sda=e.target.checked;render();});
let qt;document.getElementById("q").addEventListener("input",e=>{clearTimeout(qt);qt=setTimeout(()=>{state.q=e.target.value;render();},180);});
load();
</script>
</body>
</html>
