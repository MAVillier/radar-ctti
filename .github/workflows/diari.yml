name: Enriquir radar diari

on:
  schedule:
    - cron: "0 6 * * *"     # cada dia ~08:00 hora catalana (06:00 UTC)
  workflow_dispatch: {}      # botó per executar-ho quan vulguis

permissions:
  contents: write

jobs:
  enriquir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Executar l'enriquidor
        run: python enriquir.py
      - name: Desar els canvis
        run: |
          git config user.name  "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Actualitzacio diaria del radar"
          git push
